<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>

    <!-- Rocket & Accent Gradient -->
    <linearGradient id="rocketGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Glow/Light Trail Gradient -->
    <linearGradient id="trailGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.6" />
    </linearGradient>

    <!-- Document Lines Gradient -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Drop Shadow Filter for Rocket -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Slate Background -->
  <rect width="800" height="800" rx="160" fill="url(#bgGrad)" />

  <!-- Abstract Resume/Document Backdrop (Growth Lines) -->
  <g transform="translate(180, 240)">
    <!-- Document Card Outline -->
    <rect x="0" y="0" width="440" height="360" rx="24" fill="#1e293b" stroke="url(#docGrad)" stroke-width="4" opacity="0.4" />
    
    <!-- Abstract Resume Lines representing Career Progress -->
    <rect x="40" y="50" width="200" height="16" rx="8" fill="url(#docGrad)" opacity="0.9" />
    <rect x="40" y="90" width="360" height="12" rx="6" fill="#64748b" opacity="0.6" />
    <rect x="40" y="120" width="320" height="12" rx="6" fill="#64748b" opacity="0.6" />
    
    <rect x="40" y="180" width="140" height="16" rx="8" fill="url(#docGrad)" opacity="0.9" />
    <rect x="40" y="220" width="360" height="12" rx="6" fill="#64748b" opacity="0.6" />
    <rect x="40" y="250" width="280" height="12" rx="6" fill="#64748b" opacity="0.6" />
  </g>

  <!-- Dynamic Energy Exhaust Trail (Representing growth and speed) -->
  <path d="M 330 680 L 400 480 L 470 680 Q 400 640 330 680 Z" fill="url(#trailGrad)" />
  <circle cx="400" cy="560" r="100" fill="#a855f7" opacity="0.15" filter="url(#glow)" />

  <!-- Premium Sleek Rocket Ship Design -->
  <g filter="url(#glow)">
    <!-- Left Fin -->
    <path d="M 330 460 Q 280 500 290 560 Q 340 540 360 480 Z" fill="url(#rocketGrad)" />
    
    <!-- Right Fin -->
    <path d="M 470 460 Q 520 500 510 560 Q 460 540 440 480 Z" fill="url(#rocketGrad)" />
    
    <!-- Rocket Main Body -->
    <path d="M 400 200 C 430 300 470 440 450 520 C 450 540 350 540 350 520 C 330 440 370 300 400 200 Z" fill="url(#rocketGrad)" />
    
    <!-- Futuristic Glass Cabin Window -->
    <circle cx="400" cy="330" r="32" fill="#0f172a" />
    <circle cx="400" cy="330" r="24" fill="#38bdf8" />
    <path d="M 384 316 A 24 24 0 0 1 416 316 Z" fill="#ffffff" opacity="0.4" />
    
    <!-- Thruster nozzle -->
    <rect x="380" y="520" width="40" height="16" rx="6" fill="#334155" />
    <ellipse cx="400" cy="536" rx="20" ry="6" fill="#f43f5e" />
  </g>

  <!-- High-End Decorative Stars (Representing Success & Quality) -->
  <!-- Top Right Star -->
  <path d="M 640 180 Q 640 220 680 220 Q 640 220 640 260 Q 640 220 600 220 Q 640 220 640 180 Z" fill="#38bdf8" />
  <!-- Left Star -->
  <path d="M 160 380 Q 160 400 180 400 Q 160 400 160 420 Q 160 400 140 400 Q 160 400 160 380 Z" fill="#f59e0b" />
  <!-- Small Star Top Left -->
  <path d="M 280 120 Q 280 130 290 130 Q 280 130 280 140 Q 280 130 270 130 Q 280 130 280 120 Z" fill="#ffffff" opacity="0.8" />
</svg>
